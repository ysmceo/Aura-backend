services:
  - type: web
    name: aura-salon-backend
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: salon-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_STORE_MODE
        value: mongo
      - key: MONGODB_DB_NAME
        value: aura_salon
      - key: MONGODB_STATE_COLLECTION
        value: app_state
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_SECRET_PASSCODE
        sync: false
      - key: EMAIL_PROVIDER
        value: brevo
      - key: EMAIL_FROM
        value: "Aura Salon <no-reply@aurasalon.com>"
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_BASE_URL
        value: https://api.brevo.com/v3
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_SERVICE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
